<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pixel rabbit favicon — a small nod to Rabbit hole.exe, no image asset needed -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%87%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nikitha's personal portfolio — a retro digital workspace of projects, research, and things she's learning." />
    <title>Nikitha — Portfolio</title>

    <!--
      Three-tier type system (see src/styles/tokens.css for how these are
      wired up as CSS variables):
        - Press Start 2P : pixel display font, used ONLY for window titles,
                            headings, and small badges — never body text.
        - Space Mono      : monospace, used for meta info like dates/tags.
        - Space Grotesk    : the actual readable font for all paragraph copy.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
